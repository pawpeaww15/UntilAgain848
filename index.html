<!DOCTYPE html>
<html>
<head>
    <title>A Decade Later</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5e6d3;
            margin: 0;
            padding: 40px;
        }

        h1 {
            color: #5b3a29;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .container img {
            width: 250px;
            border-radius: 10px;
        }

        .text {
            max-width: 300px;
            font-size: 18px;
            color: #7a5c4d;
            text-align: left;
        }
    </style>
</head>

<body>

    <h1>A Decade Later</h1>
    <p>Celebrating Grandma’s Special 80th</p>

    <div class="container">
        <img src="grandma.jpg" alt="Grandma Photo">

        <div class="text">
            This special vacation brings our family together again after ten years.  
            It is a celebration of love, memories, and our grandma’s 80 beautiful years of life.
        </div>
    </div>

</body>
</html>
